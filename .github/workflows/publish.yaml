# Workflow to automate publishing zpl_kit to pub.dev
name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with v (e.g., v0.0.4)

jobs:
  # PHASE 1: Quality Checks (Analyze & Test)
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Verify Version & Changelog
        run: |
          PUBSPEC_VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: version mismatch ($PUBSPEC_VERSION vs tag $TAG_VERSION)"
            exit 1
          fi
          if ! grep -q "## $PUBSPEC_VERSION" CHANGELOG.md; then
            echo "Error: CHANGELOG.md missing entries for $PUBSPEC_VERSION"
            exit 1
          fi

  # PHASE 2: Official Publishing
  publish:
    needs: checks # Only run if Phase 1 passes!
    permissions:
      id-token: write # Required for OIDC
    # The official Google/Dart reusable workflow
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
